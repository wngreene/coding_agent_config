[tui]
notifications = false
status_line = ["model-with-reasoning", "current-dir", "git-branch", "pull-request-number", "context-remaining", "five-hour-limit", "weekly-limit", "context-window-size"]
status_line_use_colors = true
terminal_title = []

[tui.model_availability_nux]
"gpt-5.5" = 4
"gpt-5.6-sol" = 4

[mcp_servers.expo]
